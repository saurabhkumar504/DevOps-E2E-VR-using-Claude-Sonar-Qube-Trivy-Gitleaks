# =====================================================================
# SonarCloud Cloud configuration for vulnerable-spring-app.
# Auto-discovered by the Maven Sonar plugin when running
# `mvn sonar:sonar`. The Maven plugin's property resolver DOES support
# `${env.X}` placeholders (it reads them from the Maven process's
# environment, which is inherited from the shell), unlike the
# `sonarsource/sonarqube-scan-action@v3` Docker wrapper.
#
# Identity values come from GitHub Actions variables/secrets exposed to
# the step via the workflow's `env:` block — they're never echoed into
# the properties file itself. `SONARQUBE_TOKEN` is passed via
# `-Dsonar.token=...` on the mvn command line (also from the env block)
# so it's never written to disk either.
# =====================================================================

# --- Project identity (sourced from CI env vars) -----------------------
sonar.projectKey=${env.SONAR_PROJECT_KEY}
sonar.organization=${env.SONAR_ORGANIZATION}
sonar.host.url=${env.SONAR_HOST_URL}

# --- Source layout ------------------------------------------------------
sonar.sources=src/main/java
sonar.tests=src/test/java
sonar.java.binaries=target/classes
sonar.sourceEncoding=UTF-8
sonar.java.source=21

# --- Coverage + test reports -------------------------------------------
# Generated by the `coverage` Maven profile (see pom.xml). The JaCoCo
# prepare-agent binds to the `test` phase and the report goal binds to
# `verify`, so target/site/jacoco/jacoco.xml exists by the time the
# scanner runs.
sonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=target/surefire-reports

# --- Exclusions ---------------------------------------------------------
# The Spring Boot main class is a generated entry point with no logic
# worth analysing. Adding it would inflate LoC and produce zero signal.
sonar.exclusions=**/VulnerableSpringAppApplication.java
